<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body { background-color: #f8f9fa; }
    .sidebar {
        min-height: 100vh;
        background-color: #343a40;
        color: white;
    }
    .sidebar a {
        color: white;
        display: block;
        padding: 10px;
        text-decoration: none;
    }
    .sidebar a:hover {
        background-color: #495057;
    }
    .content-section {
        display: none;
    }
    .content-section.active {
        display: block;
    }
</style>
</head>
<body>
<div class="container-fluid">
<div class="row">
    <nav class="col-md-3 col-lg-2 d-md-block sidebar p-3">
        <h4 class="mb-4"><a href="./index.php">Admin Panel</a> </h4>
        <a href="#" onclick="showSection('reservations')">📋 Rezervimet</a>
        <a href="#" onclick="showSection('addCar')">🚗 Shto Makina</a>
    </nav>

    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
        <!-- Rezervimet -->
        <div id="reservations" class="content-section active">
            <h3 class="mb-4">Lista e Rezervimeve</h3>
            <div class="table-responsive">
                <table class="table table-bordered align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Makina</th>
                        <th>Klienti</th>
                        <th>Email</th>
                        <th>Data</th>
                        <th>Ditet</th>
                        <th>Totali (€)</th>
                    </tr>
                    </thead>
                    <tbody id="reservationTableBody">
                        <tr><td colspan="7" class="text-center text-muted">Nuk ka rezervime.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Shto Makina -->
        <div id="addCar" class="content-section">
            <h3 class="mb-4">Shto Makina</h3>
            <form id="addCarForm" class="card p-4 shadow-sm" enctype="multipart/form-data" method="post">
                <div class="mb-3">
                    <label class="form-label">Emri i Makinës</label>
                    <input type="text" class="form-control" id="carName" name="carName" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Përshkrimi</label>
                    <textarea class="form-control" id="carDesc" name="carDesc" rows="2" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Çmimi për ditë (€)</label>
                    <input type="number" class="form-control" id="carPrice" name="carPrice" min="0" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Foto</label>
                    <input type="file" class="form-control" id="carImage" name="image" accept="image/*" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Shto Makinën</button>
                <div id="carAddedMsg" class="alert alert-success mt-3 d-none">Makina u shtua me sukses!</div>
                <div id="carErrorMsg" class="alert alert-danger mt-3 d-none">Ndodhi një gabim!</div>
            </form>
        </div>
    </main>
</div>
</div>

<script>
function showSection(id) {
    document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'reservations') loadReservations();
}

function loadReservations() {
    fetch('get_reservations.php')
        .then(response => response.json())
        .then(reservations => {
            const tbody = document.getElementById('reservationTableBody');
            if (reservations.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Nuk ka rezervime.</td></tr>';
                return;
            }
            tbody.innerHTML = '';
            reservations.forEach((res, i) => {
    tbody.innerHTML += `
        <tr>
            <td>${i + 1}</td>
            <td>${res.car_name}</td>
            <td>${res.customer_name}</td>
            <td>${res.customer_email}</td>
            <td>${res.pickup_date} → ${res.return_date}</td>
            <td>${res.total_price} €</td>
            <td>${res.created_at}</td>
        </tr>
    `;
});

        })
        .catch(err => console.error(err));
}

document.getElementById("addCarForm").addEventListener("submit", function (e) {
    e.preventDefault();

    const formData = new FormData(this);

    fetch('add_car.php', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            document.getElementById("addCarForm").reset();
            document.getElementById("carAddedMsg").classList.remove("d-none");
            document.getElementById("carErrorMsg").classList.add("d-none");
        } else {
            document.getElementById("carErrorMsg").classList.remove("d-none");
            document.getElementById("carAddedMsg").classList.add("d-none");
        }
        setTimeout(() => {
            document.getElementById("carAddedMsg").classList.add("d-none");
            document.getElementById("carErrorMsg").classList.add("d-none");
        }, 3000);
    })
    .catch(() => {
        document.getElementById("carErrorMsg").classList.remove("d-none");
    });
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
