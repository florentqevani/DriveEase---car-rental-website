databases:
  - name: car-rental-db
    plan: free
    databaseName: car_rental
    user: car_rental_user

services:
  # ── Backend API ──────────────────────────────────────────
  - type: web
    name: car-rental-server
    runtime: node
    plan: free
    region: frankfurt
    rootDir: server
    numInstances: 1
    buildCommand: npm ci --omit=dev && mkdir -p uploads && cp -n seed-images/* uploads/ 2>/dev/null || true && cp -r ../db ./db 2>/dev/null || true
    startCommand: node seed.js; node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.18.1"
      - key: DATABASE_URL
        fromDatabase:
          name: car-rental-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false # set to https://car-rental-client.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # ── Frontend Static Site ─────────────────────────────────
  - type: web
    name: car-rental-client
    runtime: static
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false # set to https://car-rental-server.onrender.com/api
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
